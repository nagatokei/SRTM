<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>AI & Chat Fetcher</title>
  <style>
    body { margin: 0; padding: 20px; font-family: system-ui, sans-serif; background: #111827; color: #e5e7eb; }
    .container { max-width: 600px; margin: 0 auto; background: #1f2933; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    h2 { color: #60a5fa; margin-top: 0; }
    .control-group { margin-bottom: 15px; }
    label { display: block; font-size: 12px; color: #9ca3af; margin-bottom: 5px; }
    input { width: 100%; padding: 10px; background: #0f172a; color: white; border: 1px solid #374151; border-radius: 6px; box-sizing: border-box; margin-bottom: 5px; }
    button { width: 100%; padding: 12px; background: #0078d4; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    button:hover { background: #005a9e; }
    #log_area { height: 200px; background: #000; padding: 10px; overflow-y: auto; font-family: monospace; font-size: 12px; border-radius: 6px; margin-top: 15px; border: 1px solid #374151; color: #a3be8c; }
    .log-item { border-bottom: 1px solid #222; padding-bottom: 5px; margin-bottom: 5px; }
    .log-author { color: #81a1c1; font-weight: bold; }
  </style>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
  <div class="container">
    <h2>AI & Chat Fetcher (司令塔)</h2>
    
    <div class="control-group">
      <label>1. Receiverへ接続 (コメントを画面に流すため)</label>
      <input type="text" id="target_id" placeholder="ReceiverのIDを入力">
      <button id="btn_connect">接続する</button>
      <div id="conn_status" style="font-size: 12px; color: #ffcc00; margin-top: 5px;">未接続</div>
    </div>

    <hr style="border-color: #374151; margin: 20px 0;">

    <div class="control-group">
      <label>2. YouTube チャット連携</label>
      <input type="password" id="i_yt_apikey" placeholder="YouTube Data API v3 Key">
      <input type="text" id="i_yt_url" placeholder="YouTube Live URL または Video ID">
      <button id="btn_yt_start" style="background: #e94560;">チャット取得 開始</button>
      <div id="yt_status" style="font-size: 12px; color: #aaa; margin-top: 5px;">待機中...</div>
    </div>

    <div id="log_area">ここに取得したコメントが表示されます...</div>
  </div>

  <script>
    // --- PeerJS 接続設定 ---
    let peer = new Peer(), conn = null;
    document.getElementById("target_id").value = localStorage.getItem("last_room_id") || "";
    
    document.getElementById("btn_connect").onclick = () => {
      const id = document.getElementById("target_id").value.trim();
      if(!id) return;
      document.getElementById("conn_status").innerText = "接続中...";
      conn = peer.connect(id);
      conn.on('open', () => { document.getElementById("conn_status").innerText = "接続成功！ (Receiver)"; document.getElementById("conn_status").style.color = "#a3be8c"; });
      conn.on('close', () => { document.getElementById("conn_status").innerText = "切断されました"; });
    };

    function addLog(author, message) {
      const log = document.getElementById("log_area");
      log.innerHTML += `<div class="log-item"><span class="log-author">${author}:</span> ${message}</div>`;
      log.scrollTop = log.scrollHeight;
    }

    // --- コメント受信時の司令塔（外部連携フック） ---
    async function processChatMessage(author, message) {
      addLog(author, message);

      // 1. Receiverへ送信（画面にニコニコ風に流す）
      if (conn && conn.open) {
        conn.send({ type: 'chatMessage', author: author, message: message });
      }

      // --------------------------------------------------------
      // ★ 今後、ここにVoicevoxやGeminiとの連携処理を追加していきます！
      // --------------------------------------------------------
    }

    // --- YouTube チャット連携 ---
    let ytChatInterval = null, ytNextPageToken = "", ytLiveChatId = "", isYtChatFirstFetch = true;
    document.getElementById("i_yt_apikey").value = localStorage.getItem("yt_apikey") || "";
    document.getElementById("i_yt_url").value = localStorage.getItem("yt_url") || "";

    document.getElementById("btn_yt_start").onclick = async () => {
      const apiKey = document.getElementById("i_yt_apikey").value.trim();
      let urlOrId = document.getElementById("i_yt_url").value.trim();
      const btn = document.getElementById("btn_yt_start"), status = document.getElementById("yt_status");

      if (ytChatInterval) {
        clearTimeout(ytChatInterval); ytChatInterval = null;
        btn.innerText = "チャット取得 開始"; btn.style.background = "#e94560"; status.innerText = "停止しました"; return;
      }
      if (!apiKey || !urlOrId) { alert("APIキーとURL(またはVideoID)を入力してください。"); return; }

      localStorage.setItem("yt_apikey", apiKey); localStorage.setItem("yt_url", urlOrId);
      let videoId = urlOrId; const match = urlOrId.match(/(?:v=|live\/|youtu\.be\/)([^&?\/]+)/);
      if (match) videoId = match[1];

      btn.innerText = "停止中..."; status.innerText = "LiveChat IDを取得中...";
      try {
        const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=liveStreamingDetails&id=${videoId}&key=${apiKey}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error.message);
        if (!data.items || data.items.length === 0) throw new Error("配信が見つかりません。");
        if (!data.items[0].liveStreamingDetails || !data.items[0].liveStreamingDetails.activeLiveChatId) throw new Error("アクティブなチャットがありません。");

        ytLiveChatId = data.items[0].liveStreamingDetails.activeLiveChatId;
        isYtChatFirstFetch = true; ytNextPageToken = "";
        status.innerText = "コメント取得中..."; btn.innerText = "チャット取得 停止"; btn.style.background = "#374151";
        fetchChatMessages(apiKey);
      } catch(err) {
        status.innerText = "エラー: " + err.message; btn.innerText = "チャット取得 開始";
      }
    };

    async function fetchChatMessages(apiKey) {
      if (!document.getElementById("btn_yt_start").innerText.includes("停止")) return;
      try {
        let url = `https://www.googleapis.com/youtube/v3/liveChatMessages?liveChatId=${ytLiveChatId}&part=snippet,authorDetails&key=${apiKey}`;
        if (ytNextPageToken) url += `&pageToken=${ytNextPageToken}`;
        const res = await fetch(url);
        const data = await res.json();
        if (data.error) throw new Error(data.error.message);

        ytNextPageToken = data.nextPageToken;
        const pollInterval = data.pollingIntervalMillis || 5000;

        if (!isYtChatFirstFetch && data.items) {
          data.items.forEach(item => processChatMessage(item.authorDetails.displayName, item.snippet.displayMessage));
        }
        isYtChatFirstFetch = false;
        document.getElementById("yt_status").innerText = `取得中... (更新間隔: ${pollInterval/1000}秒)`;
        ytChatInterval = setTimeout(() => fetchChatMessages(apiKey), Math.max(pollInterval, 3000));
      } catch (err) {
        document.getElementById("yt_status").innerText = "エラー: " + err.message;
        document.getElementById("btn_yt_start").innerText = "チャット取得 開始"; btn.style.background = "#e94560";
      }
    }
  </script>
</body>
</html>
