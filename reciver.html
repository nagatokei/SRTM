<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VRM Receiver (Fixed & Optimized)</title>
  <style>
    body { 
      margin: 0; background: transparent; overflow: hidden; font-family: sans-serif;
      width: 100vw; height: 100vh;
    }
    #ui { 
      position: absolute; top: 10px; left: 10px; z-index: 100; 
      background: rgba(0,0,0,0.9); padding: 15px; border-radius: 8px; 
      color: white; border: 1px solid #555; width: 240px; 
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    /* 💡 ウィンドウ全体にマウスが乗ったらUIを表示 */
    body:hover #ui { opacity: 1; pointer-events: auto; }
    /* 💡 接続前やエラー時は強制表示 */
    #ui.force-show { opacity: 1; pointer-events: auto; }

    label { font-size: 11px; color: #ccc; display: block; margin: 8px 0 4px; }
    input[type="text"], input[type="password"], input[type="file"] { 
      background: #222; color: white; border: 1px solid #666; padding: 6px; 
      border-radius: 4px; width: 100%; box-sizing: border-box; font-size: 11px; 
    }
    button { 
      width: 100%; padding: 8px; cursor: pointer; background: #28a745; 
      color: white; border: none; border-radius: 4px; font-weight: bold; margin-top: 10px; 
    }
    #status { font-size: 11px; margin-top: 8px; text-align: center; color: #ffcc00; }
  </style>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

  <div id="ui" class="force-show">
    <b style="font-size: 13px;">VRM Receiver</b>
    <label>1. VRMを選択:</label>
    <input type="file" id="vrm_file" accept=".vrm">
    <label>2. 接続先ID (合言葉):</label>
    <input type="password" id="target_id" placeholder="IDを入力または貼り付け">
    <button id="btn_join">Connect</button>
    <div id="status">VRMを選択してください</div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
        "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { VRMLoaderPlugin } from '@pixiv/three-vrm';

    const uiPanel = document.getElementById("ui");
    const statusEl = document.getElementById("status");
    const vrmInput = document.getElementById("vrm_file");
    const targetInput = document.getElementById("target_id");
    
    let currentVrm, scene, camera, renderer, currentVrmUrl = null;
    let peer = null, conn = null, reconnectTimer = null;

    // 💡 起動時に保存されたIDを復元
    window.onload = () => {
      const savedId = localStorage.getItem("vrm_receive_id");
      if (savedId) targetInput.value = savedId;
    };

    // --- Scene Setup ---
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20.0);
    camera.position.set(0, 1.4, 1.5);
    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0); 
    document.body.appendChild(renderer.domElement);
    scene.add(new THREE.DirectionalLight(0xffffff, Math.PI), new THREE.AmbientLight(0xffffff, 0.5));

    vrmInput.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      if (currentVrmUrl) URL.revokeObjectURL(currentVrmUrl);
      currentVrmUrl = URL.createObjectURL(file);
      loadVrm(currentVrmUrl);
    };

    function loadVrm(url) {
      statusEl.innerText = "Loading...";
      if (currentVrm) { scene.remove(currentVrm.scene); currentVrm = null; }
      new GLTFLoader().register(p => new VRMLoaderPlugin(p)).load(url, 
        gltf => {
          currentVrm = gltf.userData.vrm;
          scene.add(gltf.scene);
          currentVrm.scene.scale.set(-1, 1, 1);
          statusEl.innerText = "VRM Ready!";
        },
        undefined,
        err => { statusEl.innerText = "Load Error"; }
      );
    }

    // --- 💡 接続ロジック（古い方の「動く」構造を採用） ---
    function startConnection() {
      const targetId = targetInput.value;
      if(!currentVrm || !targetId) { 
        statusEl.innerText = "VRMとIDが必要です"; 
        uiPanel.classList.add("force-show");
        return; 
      }
      
      localStorage.setItem("vrm_receive_id", targetId);
      
      // 💡 接続のたびにPeerを新しく生成（これが確実）
      if (peer) peer.destroy();
      peer = new Peer();

      statusEl.innerText = "Connecting...";

      peer.on('open', () => {
        conn = peer.connect(targetId);
        
        conn.on('open', () => {
          statusEl.innerText = "Connected!";
          statusEl.style.color = "#00ff00";
          uiPanel.classList.remove("force-show");
          if (reconnectTimer) { clearInterval(reconnectTimer); reconnectTimer = null; }
        });

        conn.on('data', (data) => updateVrm(data));
        
        conn.on('close', () => {
          statusEl.innerText = "切断されました。再試行中...";
          statusEl.style.color = "#ff4444";
          uiPanel.classList.add("force-show");
          triggerReconnect();
        });
      });

      peer.on('error', (err) => {
        console.error(err);
        triggerReconnect();
      });
    }

    function triggerReconnect() {
      if (reconnectTimer) return;
      reconnectTimer = setInterval(() => {
        console.log("再接続を試みています...");
        startConnection();
      }, 5000);
    }

    document.getElementById("btn_join").onclick = startConnection;

    function updateVrm(v) {
      if (!currentVrm) return;
      currentVrm.scene.position.y = v.h;
      const armL = currentVrm.humanoid.getNormalizedBoneNode("leftUpperArm");
      const armR = currentVrm.humanoid.getNormalizedBoneNode("rightUpperArm");
      if(armL) armL.rotation.z = THREE.MathUtils.degToRad(v.la);
      if(armR) armR.rotation.z = THREE.MathUtils.degToRad(-v.ra);
      
      if (v.s) {
        const exp = currentVrm.expressionManager;
        const adj = (s) => Math.min(1.0, s > 0.1 ? s * v.b : 0);
        exp.setValue("blinkRight", adj(v.s.eyeBlinkRight || 0));
        exp.setValue("blinkLeft", adj(v.s.eyeBlinkLeft || 0));
        exp.setValue("aa", v.s.jawOpen || 0);
      }
      if (v.r) {
        const rot = new THREE.Quaternion().fromArray(v.r);
        const halfRot = new THREE.Quaternion().set(0,0,0,1).slerp(rot, 0.5);
        const head = currentVrm.humanoid.getNormalizedBoneNode("head");
        const neck = currentVrm.humanoid.getNormalizedBoneNode("neck");
        if(head && neck) { neck.quaternion.copy(halfRot); head.quaternion.copy(halfRot); }
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      if (currentVrm) currentVrm.update(1.0/60.0);
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
