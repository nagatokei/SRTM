<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VRM Universal Receiver</title>
  <style>
    body { margin: 0; background: transparent; color: white; font-family: sans-serif; overflow: hidden; }
    #ui_panel { 
      position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); 
      padding: 15px; z-index: 10; border-radius: 8px; width: 260px;
      transition: opacity 0.5s; opacity: 1;
    }
    #ui_panel.connected { opacity: 0; }
    #ui_panel.connected:hover { opacity: 1; }
    .control-group { margin-bottom: 10px; }
    label { display: block; font-size: 11px; color: #ccc; }
    input { width: 100%; padding: 5px; background: #222; color: #fff; border: 1px solid #666; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 8px; cursor: pointer; background: #444; color: white; border: none; border-radius: 4px; margin-top: 10px; }
    #status { font-size: 12px; color: #ffcc00; margin-top: 8px; text-align: center; }
  </style>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

  <div id="ui_panel">
    <b style="font-size: 14px;">Receiver Settings</b>
    <div class="control-group" style="margin-top:10px;">
      <label>1. 使用するVRMを選択 (初回のみ):</label>
      <input type="file" id="vrm_file" accept=".vrm">
    </div>
    <div class="control-group">
      <label>2. 合言葉 (ID):</label>
      <input type="text" id="target_id" placeholder="例: my-avatar-room">
      <button id="btn_connect">Connect</button>
    </div>
    <div id="status">VRMを選択してConnectを押してください</div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
        "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { VRMLoaderPlugin } from '@pixiv/three-vrm';

    const statusEl = document.getElementById("status");
    const uiPanel = document.getElementById("ui_panel");
    let currentVrm, peer, conn, currentVrmUrl;
    let reconnectTimer = null;

    // VRM読み込み処理
    document.getElementById("vrm_file").onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      if (currentVrmUrl) URL.revokeObjectURL(currentVrmUrl);
      currentVrmUrl = URL.createObjectURL(file);
      loadVRM(currentVrmUrl);
    };

    function loadVRM(url) {
      new GLTFLoader().register(p => new VRMLoaderPlugin(p)).load(url, gltf => {
        if (currentVrm) scene.remove(currentVrm.scene);
        currentVrm = gltf.userData.vrm;
        scene.add(gltf.scene);
        currentVrm.scene.scale.set(-1, 1, 1);
        statusEl.innerText = "VRM読み込み完了！";
      });
    }

    // 接続・再接続メインロジック
    function connectToSender() {
      const targetId = document.getElementById("target_id").value;
      if (!currentVrm || !targetId) { alert("VRMとIDが必要です"); return; }
      
      if (peer) peer.destroy();
      peer = new Peer();
      
      peer.on('open', () => {
        conn = peer.connect(targetId);
        
        conn.on('open', () => {
          statusEl.innerText = "Connected!";
          statusEl.style.color = "#00ff00";
          uiPanel.classList.add("connected");
          if (reconnectTimer) {
             clearInterval(reconnectTimer);
             reconnectTimer = null;
          }
        });
        
        conn.on('data', data => {
          if (!currentVrm) return;
          currentVrm.scene.position.y = data.h;
          const armL = currentVrm.humanoid.getNormalizedBoneNode("leftUpperArm");
          const armR = currentVrm.humanoid.getNormalizedBoneNode("rightUpperArm");
          if(armL) armL.rotation.z = THREE.MathUtils.degToRad(data.la);
          if(armR) armR.rotation.z = THREE.MathUtils.degToRad(-data.ra);

          if (data.r) {
            const head = currentVrm.humanoid.getNormalizedBoneNode("head");
            const neck = currentVrm.humanoid.getNormalizedBoneNode("neck");
            const rot = new THREE.Quaternion().fromArray(data.r);
            const halfRot = new THREE.Quaternion().set(0,0,0,1).slerp(rot, 0.5);
            if(head && neck) { neck.quaternion.copy(halfRot); head.quaternion.copy(halfRot); }
          }
          if (data.s) {
            const exp = currentVrm.expressionManager;
            const adj = (s) => Math.min(1.0, s > 0.1 ? s * data.b : 0);
            exp.setValue("blinkRight", adj(data.s.eyeBlinkRight || 0));
            exp.setValue("blinkLeft", adj(data.s.eyeBlinkLeft || 0));
            exp.setValue("aa", data.s.jawOpen || 0);
          }
        });

        conn.on('close', startReconnect);
      });

      peer.on('error', (err) => {
        console.error(err);
        startReconnect();
      });
    }

    function startReconnect() {
      if (reconnectTimer) return; // 二重起動防止
      statusEl.innerText = "切断されました。再接続試行中...";
      statusEl.style.color = "#ff4444";
      uiPanel.classList.remove("connected");
      
      reconnectTimer = setInterval(() => {
        console.log("再接続を試みています...");
        connectToSender();
      }, 5000);
    }

    document.getElementById("btn_connect").onclick = connectToSender;

    // Three.js 基本設定
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20.0);
    camera.position.set(0, 1.4, 1.5);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0);
    document.body.appendChild(renderer.domElement);
    scene.add(new THREE.DirectionalLight(0xffffff, Math.PI), new THREE.AmbientLight(0xffffff, 0.5));

    function animate() {
      requestAnimationFrame(animate);
      if (currentVrm) currentVrm.update(1.0/60.0);
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
