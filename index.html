<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>SRTM WCFTS - Portal</title>
    <style>
        body { margin: 0; background: #121212; color: #e0e0e0; font-family: 'Segoe UI', Meiryo, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { text-align: center; max-width: 800px; padding: 40px 20px; width: 100%; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; color: #0078d4; letter-spacing: 1px; }
        .subtitle { color: #888; margin-bottom: 40px; font-size: 1rem; }
        
        /* カード部分 */
        .card-container { display: flex; gap: 25px; justify-content: center; flex-wrap: wrap; margin-bottom: 40px; }
        .card { background: #1e1e1e; border: 1px solid #333; border-radius: 16px; padding: 30px; width: 260px; transition: all 0.3s ease; text-decoration: none; color: white; position: relative; overflow: hidden; }
        .card:hover { transform: translateY(-8px); border-color: #0078d4; background: #252525; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card h2 { font-size: 1.5rem; margin: 15px 0 10px; }
        .card p { font-size: 0.9rem; color: #bbb; line-height: 1.6; margin: 0; }
        .icon { font-size: 3.5rem; display: block; }
        
        /* URL生成セクション (旧説明ガイド) */
        .generator-section { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 30px; text-align: left; border: 1px solid #333; box-shadow: inset 0 0 20px rgba(0,0,0,0.2); }
        .generator-section h3 { margin-top: 0; color: #0078d4; font-size: 1.3rem; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; display: flex; align-items: center; }
        .generator-section h3::before { content: "🔗"; margin-right: 10px; }

        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.85rem; color: #0078d4; margin-bottom: 8px; font-weight: bold; }
        input { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; font-size: 0.9rem; outline: none; transition: 0.2s; }
        input:focus { border-color: #0078d4; background: #333; }
        
        .gen-btn { width: 100%; padding: 12px; background: #0078d4; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .gen-btn:hover { background: #008ae6; transform: scale(1.01); }

        /* 結果エリア */
        #result_area { margin-top: 25px; padding: 20px; background: #111; border-radius: 8px; border-left: 4px solid #0078d4; display: none; animation: fadeIn 0.4s ease; }
        .result-label { font-size: 0.8rem; color: #888; margin-bottom: 10px; display: block; }
        #output_url { word-break: break-all; font-family: 'Consolas', monospace; font-size: 0.85rem; color: #00d4ff; background: #222; padding: 10px; border-radius: 4px; display: block; margin-bottom: 15px; }
        .copy-btn { background: transparent; border: 1px solid #0078d4; color: #0078d4; padding: 6px 15px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
        .copy-btn:hover { background: #0078d4; color: white; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 600px) { .input-row { grid-template-columns: 1fr; } .card { width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>SRTM WCFTS</h1>
        <p class="subtitle">ブラウザだけで完結する、VRM用ウェブカメラフェイストラッキングシステム</p>
        
        <div class="card-container">
            <a href="sender.html" class="card">
                <span class="icon">🎥</span>
                <h2>Transmitter</h2>
                <p>自分の表情を送信する<br>配信用PCで開きます。</p>
            </a>
            <a href="receiver.html" class="card">
                <span class="icon">🖥️</span>
                <h2>Receiver</h2>
                <p>アバターを表示する<br>OBSのブラウザソース用です。</p>
            </a>
        </div>

        <div class="generator-section">
            <h3>OBS用URL発行ツール</h3>
            
            <div class="input-row">
                <div class="input-group">
                    <label>1. 送信者ID (PeerID)</label>
                    <input type="text" id="gen_id" placeholder="Transmitterに表示されるID">
                </div>
                <div class="input-group">
                    <label>2. VRM共有リンク</label>
                    <input type="text" id="gen_vrm" placeholder="Dropbox等のファイルURL">
                </div>
            </div>

            <button class="gen-btn" onclick="generateURL()">設定URLを生成する</button>

            <div id="result_area">
                <span class="result-label">このURLをコピーしてOBSのブラウザソースに貼り付けてください：</span>
                <code id="output_url"></code>
                <button class="copy-btn" onclick="copyURL()">クリップボードにコピー</button>
            </div>
        </div>

        <p style="margin-top: 30px; font-size: 0.8rem; color: #555;">
            ※ URL生成機能は、VRMファイルを自動読み込みさせるためのショートカットを作成します。
        </p>
    </div>

    <script>
        function generateURL() {
            const id = document.getElementById('gen_id').value.trim();
            const vrm = document.getElementById('gen_vrm').value.trim();
            
            if(!id || !vrm) {
                alert("IDとVRMリンクの両方を入力してください。");
                return;
            }

            const currentUrl = window.location.href;
            const baseUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/'));
            // 宛先を receiver.html に指定
            const finalUrl = `${baseUrl}/receiver.html?id=${encodeURIComponent(id)}&vrm=${encodeURIComponent(vrm)}`;

            document.getElementById('output_url').innerText = finalUrl;
            document.getElementById('result_area').style.display = 'block';
        }

        function copyURL() {
            const text = document.getElementById('output_url').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("URLをコピーしました！");
            });
        }
    </script>
</body>
</html>
