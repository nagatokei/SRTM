<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>VRM Universal System - Portal</title>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #1a1a1a; color: #eee; line-height: 1.6; display: flex; justify-content: center; padding: 40px 20px; }
    .container { max-width: 600px; width: 100%; }
    h1 { text-align: center; color: #00d4ff; margin-bottom: 30px; }
    
    .card { background: #2a2a2a; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #444; }
    .card h2 { margin-top: 0; font-size: 18px; color: #ffcc00; display: flex; align-items: center; }
    .card h2::before { content: "🚀"; margin-right: 8px; }

    .btn { display: inline-block; width: 100%; padding: 12px; text-align: center; text-decoration: none; border-radius: 6px; font-weight: bold; transition: 0.2s; cursor: pointer; border: none; }
    .btn-blue { background: #007bff; color: white; }
    .btn-blue:hover { background: #0056b3; }
    .btn-green { background: #28a745; color: white; }
    .btn-green:hover { background: #218838; }

    .input-group { margin-top: 15px; }
    label { display: block; font-size: 13px; color: #aaa; margin-bottom: 5px; }
    input { width: 100%; padding: 10px; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
    
    .result-area { margin-top: 20px; padding: 15px; background: #111; border: 1px dashed #00d4ff; border-radius: 6px; display: none; }
    .result-url { word-break: break-all; font-family: monospace; font-size: 12px; color: #00d4ff; margin-bottom: 10px; display: block; }
    
    .note { font-size: 12px; color: #888; margin-top: 10px; }
  </style>
</head>
<body>

<div class="container">
  <h1>VRM System Portal</h1>

  <!-- 1. Sender (自分用) -->
  <div class="card">
    <h2>トラッキングを開始する (Sender)</h2>
    <p>自分のカメラで表情を読み取り、データを送信します。</p>
    <a href="sender.html" class="btn btn-blue">Transmitter を開く</a>
  </div>

  <!-- 2. URL Generator (設定作成) -->
  <div class="card">
    <h2>配信者用URLを作成する</h2>
    <p>クラウドに上げたVRMと、自分のIDを紐付けた専用URLを発行します。</p>
    
    <div class="input-group">
      <label>送信者のPeerID (Senderに表示されるID):</label>
      <input type="text" id="gen_id" placeholder="例: abc123de-f456...">
    </div>

    <div class="input-group">
      <label>VRMの共有リンク (Dropbox / Google Drive):</label>
      <input type="text" id="gen_vrm" placeholder="https://www.dropbox.com/s/...">
      <p class="note">※フォルダではなく「ファイル単体」の共有リンクを貼ってください</p>
    </div>

    <button class="btn btn-green" style="margin-top:20px;" onclick="generateURL()">設定URLを発行する</button>

    <div id="result_area" class="result-area">
      <label>以下のURLをコピーしてOBSのブラウザソースに貼ってください：</label>
      <code id="output_url" class="result-url"></code>
      <button class="btn btn-blue" style="font-size:12px; padding:5px;" onclick="copyURL()">URLをコピー</button>
    </div>
  </div>

  <!-- 3. Receiver (予備・手動用) -->
  <div class="card" style="opacity: 0.7;">
    <h2 style="color: #ccc;">手動レシーバーを開く</h2>
    <p>URLを使わず、手動で設定を行いたい場合はこちら。</p>
    <a href="receiver.html" class="btn btn-blue" style="background: #555;">Receiver を開く</a>
  </div>

</div>

<script>
  function generateURL() {
    const id = document.getElementById('gen_id').value.trim();
    const vrm = document.getElementById('gen_vrm').value.trim();
    
    if(!id || !vrm) {
      alert("IDとVRMリンクの両方を入力してください。");
      return;
    }

    // 現在のページの場所をベースに receiver.html へのパスを作る
    const currentUrl = window.location.href;
    const baseUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/'));
    const finalUrl = `${baseUrl}/receiver.html?id=${encodeURIComponent(id)}&vrm=${encodeURIComponent(vrm)}`;

    document.getElementById('output_url').innerText = finalUrl;
    document.getElementById('result_area').style.display = 'block';
  }

  function copyURL() {
    const text = document.getElementById('output_url').innerText;
    navigator.clipboard.writeText(text).then(() => {
      alert("コピーしました！これを配信者さんに伝えてください。");
    });
  }
</script>

</body>
</html>
