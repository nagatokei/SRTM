<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>VRM Stable Receiver - Dynamic View</title>
    <style>
        body {
            margin: 0;
            background: transparent;
            color: rgba(0, 0, 0, 0);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #ui_panel {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(15, 15, 15, 0.95);
            padding: 18px;
            z-index: 100;
            border-radius: 12px;
            width: 280px;
            border: 1px solid #333;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
            transition: opacity 0.4s ease, visibility 0.4s;
            opacity: 0;
            visibility: hidden;
        }

        body:hover #ui_panel {
            opacity: 1;
            visibility: visible;
        }

        .panel-title {
            font-size: 14px;
            font-weight: bold;
            color: #0078d4;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .control-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 11px;
            color: #888;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        input[type="password"] {
            width: 100%;
            padding: 8px 10px;
            background: #252525;
            color: #fff;
            border: 1px solid #444;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: caption;
            letter-spacing: 0.2em;
            outline: none;
        }

        .clear-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
            font-size: 14px;
            z-index: 5;
        }

        .btn-main {
            width: 100%;
            padding: 12px;
            cursor: pointer;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.2s;
            margin-top: 5px;
        }

        .btn-main.online {
            background: #28a745;
        }

        #status {
            font-size: 12px;
            color: #ffcc00;
            margin-top: 12px;
            text-align: center;
            font-weight: 500;
            min-height: 1.2em;
        }

        hr {
            border: 0;
            border-top: 1px solid #333;
            margin: 15px 0;
        }

        #model_type_badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            color: #888;
            background: #333;
        }

        .badge-ps { background: #28a745 !important; color: #fff !important; }
        .badge-mapped { background: #ffc107 !important; color: #000 !important; }
        .badge-vrm0 { background: #e94560 !important; color: #fff !important; }
        .badge-vrm1 { background: #0078d4 !important; color: #fff !important; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>

<body>

    <div id="ui_panel">
        <div class="panel-title">
            <span>VRM RECEIVER</span>
            <span>
                <span id="vrm_version_badge" style="font-size:9px; padding:2px 6px; border-radius:3px; margin-right:4px;"></span>
                <span id="model_type_badge">No Model</span>
            </span>
        </div>
        <div class="control-group">
            <label>Local VRM File</label>
            <input type="file" id="vrm_file" accept=".vrm">
        </div>
        <hr>
        <div class="control-group">
            <label>Transmitter ID (Secure)</label>
            <div class="input-wrapper">
                <input type="password" id="target_id" placeholder="IDを入力してください">
                <span class="clear-btn" onclick="document.getElementById('target_id').value=''">✕</span>
            </div>
            <button id="btn_connect" class="btn-main">CONNECT</button>
        </div>
        <div id="status">Waiting for VRM...</div>
    </div>

    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
        "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js"
      }
    }
  </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRMLoaderPlugin } from '@pixiv/three-vrm';

        const statusEl = document.getElementById("status");
        const targetInput = document.getElementById("target_id");
        const connectBtn = document.getElementById("btn_connect");
        const modelBadge = document.getElementById("model_type_badge");
        const uiPanel = document.getElementById("ui_panel");

        let currentVrm, scene, camera, renderer, peer, conn, currentVrmUrl;
        let reconnectTimer = null;
        let modelHasPS = false;
        let isVRM0 = false;
        // カメラ同期用のターゲットデータ拡張
        let targetData = { 
            h: 0, la: 0, ra: 0, r: [0, 0, 0, 1], s: null, b: 1.0, s_scale: 1.0,
            camPos: [0, 1.4, 1.5], camTarget: [0, 1.2, 0] 
        };

        function detectVRMVersion(gltf) {
            if (gltf.parser && gltf.parser.json && gltf.parser.json.extensions) {
                const ext = gltf.parser.json.extensions;
                if (ext.VRMC_vrm) return { version: '1.0' };
                if (ext.VRM) return { version: '0.x' };
            }
            return { version: 'unknown' };
        }

        function isPerfectSyncModel(vrm) {
            if (!vrm || !vrm.expressionManager) return false;
            const testNames = ['browDownLeft', 'cheekPuff', 'noseSneerLeft'];
            return testNames.some(name => vrm.expressionManager.getExpression(name) != null);
        }

        function safeSetExpression(exp, name, value) {
            try {
                const direct = exp.getExpression(name);
                if (direct) { exp.setValue(name, value); return; }
                const cap = name.charAt(0).toUpperCase() + name.slice(1);
                if (exp.getExpression(cap)) { exp.setValue(cap, value); return; }
                exp.setValue(name, value);
            } catch (e) {}
        }

        function safeGetExpression(exp, name) {
            try {
                const val = exp.getValue(name);
                if (val !== undefined && val !== null) return val;
                const cap = name.charAt(0).toUpperCase() + name.slice(1);
                const capVal = exp.getValue(cap);
                return capVal || 0;
            } catch (e) { return 0; }
        }

        const VRM_STANDARD_EXPRESSIONS = [
            'happy', 'angry', 'sad', 'relaxed', 'surprised',
            'blinkLeft', 'blinkRight', 'aa', 'ih', 'ou', 'ee', 'oh',
            'lookUp', 'lookDown', 'lookLeft', 'lookRight'
        ];

        function mapARKitToVRM(shapes, bSense) {
            const get = (n) => shapes[n] || 0;
            const mapped = {};
            mapped.blinkLeft = Math.min(1.0, get('eyeBlinkLeft') * bSense);
            mapped.blinkRight = Math.min(1.0, get('eyeBlinkRight') * bSense);
            const jawOpen = get('jawOpen');
            const stretch = (get('mouthStretchLeft') + get('mouthStretchRight')) / 2;
            const smile = (get('mouthSmileLeft') + get('mouthSmileRight')) / 2;
            mapped.aa = Math.min(1.0, jawOpen * Math.max(0.2, 1.0 - get('mouthPucker') - get('mouthFunnel')));
            mapped.ih = Math.min(1.0, Math.max(stretch, smile * 0.5) * Math.max(0, 1.0 - jawOpen * 1.5) * 1.2);
            mapped.ou = Math.min(1.0, get('mouthPucker'));
            mapped.ee = Math.min(1.0, jawOpen * Math.max(stretch, smile * 0.3) * 2.0);
            mapped.oh = Math.min(1.0, get('mouthFunnel'));
            mapped.happy = Math.min(0.5, Math.max(0, smile - 0.25) * 0.8);
            mapped.angry = Math.min(0.5, Math.max(0, (get('mouthFrownLeft') * 0.6 + get('browDownLeft') * 0.4) - 0.2));
            mapped.surprised = Math.min(0.5, Math.max(0, (get('eyeWideLeft') * 0.5 + get('browInnerUp') * 0.5) - 0.15));
            return mapped;
        }

        document.getElementById("vrm_file").onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (currentVrmUrl) URL.revokeObjectURL(currentVrmUrl);
            currentVrmUrl = URL.createObjectURL(file);
            loadVRM(currentVrmUrl);
        };

        connectBtn.onclick = () => {
            if (reconnectTimer) clearInterval(reconnectTimer);
            connectToSender();
        };

        function loadVRM(url) {
            statusEl.innerText = "Loading VRM...";
            new GLTFLoader().register(p => new VRMLoaderPlugin(p)).load(url, gltf => {
                if (currentVrm) scene.remove(currentVrm.scene);
                currentVrm = gltf.userData.vrm;
                scene.add(gltf.scene);
                currentVrm.scene.scale.set(-1, 1, 1);
                const vrmVer = detectVRMVersion(gltf);
                isVRM0 = (vrmVer.version === '0.x');
                const vBadge = document.getElementById('vrm_version_badge');
                vBadge.innerText = `VRM ${vrmVer.version}`;
                vBadge.className = isVRM0 ? 'badge-vrm0' : 'badge-vrm1';
                modelHasPS = isPerfectSyncModel(currentVrm);
                modelBadge.innerText = modelHasPS ? "PS対応" : "自動マッピング";
                modelBadge.className = modelHasPS ? "badge-ps" : "badge-mapped";
                statusEl.innerText = "Model Ready";
                statusEl.style.color = "#00ff00";
                if (targetInput.value.trim() !== "") connectToSender();
            });
        }

        function connectToSender() {
            const targetId = targetInput.value.trim();
            if (!currentVrm || !targetId) return;
            if (peer) peer.destroy();
            peer = new Peer();
            connectBtn.innerText = "CONNECTING...";
            peer.on('open', () => {
                conn = peer.connect(targetId);
                conn.on('open', () => {
                    statusEl.innerText = "Online";
                    statusEl.style.color = "#00ff00";
                    connectBtn.innerText = "CONNECTED";
                    connectBtn.className = "btn-main online";
                    if (reconnectTimer) { clearInterval(reconnectTimer); reconnectTimer = null; }
                });
                conn.on('data', data => { if (data) targetData = data; });
                conn.on('close', startReconnect);
            });
            peer.on('error', startReconnect);
        }

        function startReconnect() {
            if (reconnectTimer) return;
            statusEl.innerText = "Retrying...";
            connectBtn.innerText = "RECONNECTING...";
            reconnectTimer = setInterval(connectToSender, 5000);
        }

        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20.0);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, premultipliedAlpha: false});
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);
        document.body.appendChild(renderer.domElement);

        // カメラ親子ライトの実装
        const camLight = new THREE.DirectionalLight(0xffffff, Math.PI);
        camLight.position.set(0, 0, 1);
        camera.add(camLight);
        scene.add(camera);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        function animate() {
            requestAnimationFrame(animate);
            if (currentVrm && targetData) {
                const lerpSpeed = 0.20; // 少し柔らかめに追従
                const mouthSpeed = 0.60;

                // ====== カメラ同期 ======
                if (targetData.camPos && targetData.camTarget) {
                    camera.position.lerp(new THREE.Vector3().fromArray(targetData.camPos), lerpSpeed);
                    // 注視点の同期（離席アニメーションもここに含まれる）
                    const tTarget = new THREE.Vector3().fromArray(targetData.camTarget);
                    // 直接lookAtするのではなく、スムーズにターゲットを追う
                    if (!camera.userData.target) camera.userData.target = new THREE.Vector3().copy(tTarget);
                    camera.userData.target.lerp(tTarget, lerpSpeed);
                    camera.lookAt(camera.userData.target);
                }

                // 位置・スケール
                currentVrm.scene.position.y += (targetData.h - currentVrm.scene.position.y) * lerpSpeed;
                const s = targetData.s_scale || 1.0;
                const currentS = Math.abs(currentVrm.scene.scale.x);
                const nextS = currentS + (s - currentS) * lerpSpeed;
                if (isVRM0) { currentVrm.scene.scale.set(nextS, nextS, -nextS); }
                else { currentVrm.scene.scale.set(-nextS, nextS, nextS); }

                // 腕の回転
                const armL = currentVrm.humanoid.getNormalizedBoneNode("leftUpperArm");
                const armR = currentVrm.humanoid.getNormalizedBoneNode("rightUpperArm");
                if (armL) armL.rotation.z += (THREE.MathUtils.degToRad(targetData.la) - armL.rotation.z) * lerpSpeed;
                if (armR) armR.rotation.z += (THREE.MathUtils.degToRad(-targetData.ra) - armR.rotation.z) * lerpSpeed;

                // 頭の回転
                if (targetData.r) {
                    const head = currentVrm.humanoid.getNormalizedBoneNode("head");
                    const neck = currentVrm.humanoid.getNormalizedBoneNode("neck");
                    const targetQuat = new THREE.Quaternion().fromArray(targetData.r);
                    const halfQuat = new THREE.Quaternion().set(0, 0, 0, 1).slerp(targetQuat, 0.5);
                    if (head && neck) {
                        neck.quaternion.slerp(halfQuat, lerpSpeed);
                        head.quaternion.slerp(halfQuat, lerpSpeed);
                    }
                }

                // 表情適用
                if (targetData.s) {
                    const exp = currentVrm.expressionManager;
                    const bSense = targetData.b || 1.5;
                    if (modelHasPS) {
                        const SKIP = new Set(['eyeBlinkLeft', 'eyeBlinkRight', 'eyeLookDownLeft', 'eyeLookDownRight', 'eyeLookInLeft', 'eyeLookInRight', 'eyeLookOutLeft', 'eyeLookOutRight', 'eyeLookUpLeft', 'eyeLookUpRight']);
                        Object.keys(targetData.s).forEach(key => {
                            const val = targetData.s[key];
                            if (key === "eyeBlinkLeft" || key === "eyeBlinkRight") {
                                const vrmK = (key === "eyeBlinkLeft") ? "blinkLeft" : "blinkRight";
                                const cur = safeGetExpression(exp, vrmK);
                                safeSetExpression(exp, vrmK, cur + (Math.min(1.0, val * bSense) - cur) * lerpSpeed);
                            } else if (key === "jawOpen" || key === "aa") {
                                const cur = safeGetExpression(exp, "aa");
                                safeSetExpression(exp, "aa", cur + (val - cur) * mouthSpeed);
                                safeSetExpression(exp, "jawOpen", cur + (val - cur) * mouthSpeed);
                            } else if (!SKIP.has(key)) {
                                const cur = safeGetExpression(exp, key);
                                safeSetExpression(exp, key, cur + (val - cur) * lerpSpeed);
                            }
                        });
                    } else {
                        const mapped = mapARKitToVRM(targetData.s, bSense);
                        VRM_STANDARD_EXPRESSIONS.forEach(name => {
                            const target = mapped[name] || 0;
                            const cur = safeGetExpression(exp, name);
                            const speed = (name === 'aa' || name === 'ih' || name === 'ou' || name === 'ee' || name === 'oh') ? mouthSpeed : lerpSpeed;
                            safeSetExpression(exp, name, cur + (target - cur) * speed);
                        });
                    }
                }

                // 視線ボーン

                if (targetData.s) {
                    const leftEye = currentVrm.humanoid.getNormalizedBoneNode("leftEye");
                    const rightEye = currentVrm.humanoid.getNormalizedBoneNode("rightEye");
                    if (leftEye && rightEye) {
                        const s = targetData.s;
                        const mp = 10 * Math.PI / 180;
                        const my = 7 * Math.PI / 180;
                        
                        // 各目の目標角度を計算
                        const tPL = ((s.eyeLookDownLeft || 0) - (s.eyeLookUpLeft || 0)) * mp;
                        const tYL = ((s.eyeLookOutLeft || 0) - (s.eyeLookInLeft || 0)) * my;
                        const tPR = ((s.eyeLookDownRight || 0) - (s.eyeLookUpRight || 0)) * mp;
                        const tYR = ((s.eyeLookInRight || 0) - (s.eyeLookOutRight || 0)) * my;

                        // 左右それぞれの目に適用
                        leftEye.rotation.x += (tPL - leftEye.rotation.x) * lerpSpeed;
                        leftEye.rotation.y += (tYL - leftEye.rotation.y) * lerpSpeed;
                        rightEye.rotation.x += (tPR - rightEye.rotation.x) * lerpSpeed;
                        rightEye.rotation.y += (tYR - rightEye.rotation.y) * lerpSpeed;
                    }
                }
                
                currentVrm.update(1.0 / 60.0);
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
