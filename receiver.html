<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>VRM Stable Receiver - Dynamic View</title>
    <style>
        body {
            margin: 0;
            background: transparent;
            color: rgba(0, 0, 0, 0);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #ui_panel {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(15, 15, 15, 0.95);
            padding: 18px;
            z-index: 100;
            border-radius: 12px;
            width: 280px;
            border: 1px solid #333;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
            transition: opacity 0.4s ease, visibility 0.4s;
            opacity: 0;
            visibility: hidden;
        }

        body:hover #ui_panel {
            opacity: 1;
            visibility: visible;
        }

        .panel-title {
            font-size: 14px;
            font-weight: bold;
            color: #0078d4;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .control-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 11px;
            color: #888;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        input[type="password"] {
            width: 100%;
            padding: 8px 10px;
            background: #252525;
            color: #fff;
            border: 1px solid #444;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: caption;
            letter-spacing: 0.2em;
            outline: none;
        }

        .clear-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
            font-size: 14px;
            z-index: 5;
        }

        .btn-main {
            width: 100%;
            padding: 12px;
            cursor: pointer;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.2s;
            margin-top: 5px;
        }

        .btn-main.online {
            background: #28a745;
        }

        #status {
            font-size: 12px;
            color: #ffcc00;
            margin-top: 12px;
            text-align: center;
            font-weight: 500;
            min-height: 1.2em;
        }

        hr {
            border: 0;
            border-top: 1px solid #333;
            margin: 15px 0;
        }

        #model_type_badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            color: #888;
            background: #333;
        }

        .badge-ps { background: #28a745 !important; color: #fff !important; }
        .badge-mapped { background: #ffc107 !important; color: #000 !important; }
        .badge-vrm0 { background: #e94560 !important; color: #fff !important; }
        .badge-vrm1 { background: #0078d4 !important; color: #fff !important; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>

<body>

    <div id="ui_panel">
        <div class="panel-title">
            <span>VRM RECEIVER</span>
            <span>
                <span id="vrm_version_badge" style="font-size:9px; padding:2px 6px; border-radius:3px; margin-right:4px;"></span>
                <span id="model_type_badge">No Model</span>
            </span>
        </div>
        <div class="control-group">
            <label>Local VRM File</label>
            <input type="file" id="vrm_file" accept=".vrm">
        </div>
        <hr>
        <div class="control-group">
            <label>Transmitter ID (Secure)</label>
            <div class="input-wrapper">
                <input type="password" id="target_id" placeholder="IDを入力してください">
                <span class="clear-btn" onclick="document.getElementById('target_id').value=''">✕</span>
            </div>
            <button id="btn_connect" class="btn-main">CONNECT</button>
        </div>
        <div id="status">Waiting for VRM...</div>
    </div>

    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
        "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js"
      }
    }
  </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRMLoaderPlugin } from '@pixiv/three-vrm';

        const statusEl = document.getElementById("status");
        const targetInput = document.getElementById("target_id");
        const connectBtn = document.getElementById("btn_connect");
        const modelBadge = document.getElementById("model_type_badge");
        const uiPanel = document.getElementById("ui_panel");

        let currentVrm, scene, camera, renderer, peer, conn, currentVrmUrl;
        let reconnectTimer = null;
        let modelHasPS = false;
        let isVRM0 = false;
        let targetData = { 
            h: 0, la: 0, ra: 0, r: [0, 0, 0, 1], s: null, b: 1.0, s_scale: 1.0,
            camPos: [0, 1.4, 1.5], camTarget: [0, 1.2, 0] 
        };

        // ====== リンク変換関数 ======
        function fixDirectUrl(url) {
            if (!url) return url;
            let d = url;
            if (d.includes("1drv.ms")) {
                try {
                    const b64 = btoa(d).replace(/\//g, '_').replace(/\+/g, '-').replace(/=/g, '');
                    return `https://api.onedrive.com/v1.0/shares/u!${b64}/root/content`;
                } catch (e) { return d; }
            }
            if (d.includes("www.dropbox.com")) {
                d = d.replace("www.dropbox.com", "dl.dropboxusercontent.com").replace(/\?dl=[01]/, "");
            }
            if (d.includes("drive.google.com")) {
                const match = d.match(/\/d\/([^\/]+)/);
                if (match) d = `https://docs.google.com/uc?id=${match[1]}&export=download`;
            }
            return d;
        }

        // ====== URLパラメータ / 記憶の取得 ======
        const urlParams = new URLSearchParams(window.location.search);
        const urlId = urlParams.get('id');
        const urlVrm = urlParams.get('vrm');

        if (urlId) targetInput.value = urlId.trim();

        let vrmToLoad = null;
        if (urlVrm && urlVrm.trim() !== "") {
            vrmToLoad = fixDirectUrl(urlVrm);
            localStorage.setItem("vrm_save_url", urlVrm);
        } else {
            const savedVrm = localStorage.getItem("vrm_save_url");
            if (savedVrm) vrmToLoad = fixDirectUrl(savedVrm);
        }

        function detectVRMVersion(gltf) {
            if (gltf.parser && gltf.parser.json && gltf.parser.json.extensions) {
                const ext = gltf.parser.json.extensions;
                if (ext.VRMC_vrm) return { version: '1.0' };
                if (ext.VRM) return { version: '0.x' };
            }
            return { version: 'unknown' };
        }

        function isPerfectSyncModel(vrm) {
            if (!vrm || !vrm.expressionManager) return false;
            const testNames = ['browDownLeft', 'cheekPuff', 'noseSneerLeft'];
            return testNames.some(name => vrm.expressionManager.getExpression(name) != null);
        }

        function safeSetExpression(exp, name, value) {
            try {
                const direct = exp.getExpression(name);
                if (direct) { exp.setValue(name, value); return; }
                const cap = name.charAt(0).toUpperCase() + name.slice(1);
                if (exp.getExpression(cap)) { exp.setValue(cap, value); return; }
                exp.setValue(name, value);
            } catch (e) {}
        }

        function safeGetExpression(exp, name) {
            try {
                const val = exp.getValue(name);
                if (val !== undefined && val !== null) return val;
                const cap = name.charAt(0).toUpperCase() + name.slice(1);
                const capVal = exp.getValue(cap);
                return capVal || 0;
            } catch (e) { return 0; }
        }

            'happy', 'angry', 'sad',
