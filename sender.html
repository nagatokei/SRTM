<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VRM Sender (Complete & Fixed)</title>
  <style>
    body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
    #ui_panel { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.85); padding: 15px; z-index: 10; border-radius: 8px; border: 1px solid #555; width: 280px; max-height: 90vh; overflow-y: auto; }
    .control-group { margin-bottom: 12px; }
    label { display: block; font-size: 11px; margin-bottom: 3px; color: #ccc; }
    input[type="range"] { width: 100%; cursor: pointer; }
    input[type="text"], input[type="file"] { width: 100%; padding: 5px; background: #222; color: #fff; border: 1px solid #666; border-radius: 4px; box-sizing: border-box; font-size: 12px; }
    button { width: 100%; padding: 8px; cursor: pointer; background: #0078d4; color: white; border: none; border-radius: 4px; font-weight: bold; margin-top: 10px; }
    button:hover { background: #005a9e; }
    .btn-secondary { background: #444; font-size: 11px; margin-top: 5px; }
    #mic_bar_bg { width: 100%; height: 6px; background: #333; border-radius: 3px; margin-top: 5px; overflow: hidden; }
    #mic_bar_fill { width: 0%; height: 100%; background: #00ff00; }
    #video_ui { position: absolute; bottom: 10px; right: 10px; width: 160px; opacity: 0.5; }
    video { width: 100%; transform: scaleX(-1); border-radius: 4px; }
    #conn_status { font-size: 12px; color: #ffcc00; margin-top: 10px; font-weight: bold; text-align: center; }
    hr { border: 0; border-top: 1px solid #444; margin: 15px 0; }
    .val-disp { float: right; color: #fff; font-weight: bold; }
  </style>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

  <div id="ui_panel">
    <b style="font-size: 14px;">VRM Sender (Complete Edition)</b>
    
    <div class="control-group" style="margin-top:15px;">
      <label>1. VRMファイルを選択:</label>
      <input type="file" id="vrm_file" accept=".vrm">
    </div>

    <div class="control-group">
      <label>2. 配信ID / 開始:</label>
      <div style="display: flex; gap: 5px;">
        <input type="text" id="room_id" readonly style="flex: 1;">
        <button id="btn_copy" class="btn-secondary" style="width: auto; margin: 0; padding: 0 10px;">コピー</button>
      </div>
      <button id="btn_start">カメラ・マイク・配信 開始</button>
      <div id="conn_status">VRMを選択してください</div>
   
      <div id="live_indicator" style="display:none; font-size:12px; color:#ff4444; text-align:center; margin-top:8px; font-weight:bold; letter-spacing: 1px;">
        <span class="blink_dot">●</span> CAMERA ACTIVE
      </div>
      <style>
        .blink_dot { animation: blink 1.2s infinite; margin-right: 4px; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
      </style>
      
      <div id="mic_bar_bg"><div id="mic_bar_fill"></div></div>
    </div>

    <hr>

    <div class="control-group">
      <label>姿勢制御</label>
      <button id="btn_reset_pose" class="btn-secondary">正面リセット (顔の向きを直す)</button>
    </div>

    <div class="control-group">
      <label>高さ調整: <span class="val-disp" id="v_h">0.00</span></label>
      <input type="range" id="s_h" min="-0.5" max="0.5" step="0.01" value="0.0">
    </div>

    <div class="control-group">
      <label>キャラの大きさ: <span class="val-disp" id="v_scale">1.0</span></label>
      <input type="range" id="s_scale" min="0.1" max="2.0" step="0.05" value="1.0">
　  </div>
    
    <div class="control-group">
      <label>左腕の角度: <span class="val-disp" id="v_l">0</span>°</label>
      <input type="range" id="s_l" min="-90" max="90" step="1" value="0">
    </div>

    <div class="control-group">
      <label>右腕の角度: <span class="val-disp" id="v_r">0</span>°</label>
      <input type="range" id="s_r" min="-90" max="90" step="1" value="0">
    </div>

    <div class="control-group">
      <label>まばたき感度: <span class="val-disp" id="v_blink">1.5</span></label>
      <input type="range" id="s_blink" min="1.0" max="3.0" step="0.1" value="1.5">
    </div>

    <div class="control-group">
      <label>マイク感度(口パク): <span class="val-disp" id="v_mic">2.5</span></label>
      <input type="range" id="s_mic" min="0.5" max="10.0" step="0.1" value="2.5">
    </div>
  </div>

  <div id="video_ui" style="display: none;">
    <video id="input_video" autoplay playsinline muted></video>
　</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
        "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js",
        "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { VRMLoaderPlugin } from '@pixiv/three-vrm';
    import { FaceLandmarker, FilesetResolver } from '@mediapipe/tasks-vision';

    const video = document.getElementById("input_video");
    const connStatus = document.getElementById("conn_status");
    const micBarFill = document.getElementById("mic_bar_fill");
    const roomIdInput = document.getElementById("room_id");

    const s_h = document.getElementById("s_h"), s_l = document.getElementById("s_l"), s_r = document.getElementById("s_r");
    const s_blink = document.getElementById("s_blink"), s_mic = document.getElementById("s_mic");

    let currentVrm, faceLandmarker, lastVideoTime = -1;
    let peer, connections = [], audioContext, analyser, dataArray, currentVolume = 0;
    let offsetRotation = new THREE.Quaternion(), shouldResetPose = false;

    // ID設定
    // 保存されたIDがあれば使い、なければ新しく作って保存する
    let savedRoomId = localStorage.getItem('last_room_id');
    if (!savedRoomId) {
      savedRoomId = "vrm-" + Math.random().toString(36).substring(2, 10);
      localStorage.setItem('last_room_id', savedRoomId);
    }
    roomIdInput.value = savedRoomId;
    
    document.getElementById("btn_copy").onclick = () => {
      const roomId = document.getElementById("room_id");
      navigator.clipboard.writeText(roomId.value).then(() => {
        const btn = document.getElementById("btn_copy");
        const originalText = btn.innerText;
        btn.innerText = "OK!";
        btn.style.background = "#28a745";
        setTimeout(() => {
          btn.innerText = originalText;
          btn.style.background = "";
        }, 2000);
      });
    };
   
    document.getElementById("btn_reset_pose").onclick = () => { shouldResetPose = true; };

    // VRM読み込み

    // IndexedDBの準備（保存先を作る）
    const dbName = "VRM_Storage";
    const storeName = "models";
    const openDb = () => {
      return new Promise((resolve) => {
        const req = indexedDB.open(dbName, 1);
        req.onupgradeneeded = (e) => e.target.result.createObjectStore(storeName);
        req.onsuccess = (e) => resolve(e.target.result);
      });
    };

    // VRMファイルが選択された時
    document.getElementById("vrm_file").onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      // 保存
      const db = await openDb();
      db.transaction(storeName, "readwrite").objectStore(storeName).put(file, "last_vrm");
  
      loadVRM(file);
    };

    // 共通の読み込み関数
    function loadVRM(fileOrBlob) {
      const url = URL.createObjectURL(fileOrBlob);
      new GLTFLoader().register(p => new VRMLoaderPlugin(p)).load(url, gltf => {
        if (currentVrm) scene.remove(currentVrm.scene);
        currentVrm = gltf.userData.vrm;
        scene.add(gltf.scene);
        currentVrm.scene.scale.set(-1, 1, 1);
        connStatus.innerText = "VRM準備OK (保存完了)";
        connStatus.style.color = "#00ff00";
      });
    }

    // 💡 ページ起動時に自動ロード
    (async () => {
      const db = await openDb();
      const req = db.transaction(storeName).objectStore(storeName).get("last_vrm");
      req.onsuccess = () => {
        if (req.result) {
          connStatus.innerText = "前回のVRMを復元中...";
          loadVRM(req.result);
        }
      };
    })();
      
    // 開始処理 (カメラ・マイク・通信)
    document.getElementById("btn_start").onclick = async () => {
      if (!currentVrm) { alert("VRMを選択してください"); return; }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: { width: 640, height: 480 } });
        video.srcObject = stream;
        video.play();

        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaStreamSource(stream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        if (audioContext.state === 'suspended') await audioContext.resume();

        if (peer) peer.destroy();
        peer = new Peer(roomIdInput.value);
        peer.on('open', id => { connStatus.innerText = "配信中: " + id; connStatus.style.color = "#00ff00"; });
        document.getElementById("live_indicator").style.display = "block";
        peer.on('connection', conn => { conn.on('open', () => connections.push(conn)); });
      } catch(e) { alert("カメラ/マイクの起動に失敗しました"); }
    };

    function animate() {
      requestAnimationFrame(animate);

      // 音量更新
      if (analyser) {
        analyser.getByteFrequencyData(dataArray);
        let sum = dataArray.reduce((a, b) => a + b, 0);
        currentVolume = (sum / dataArray.length) / 128.0;
        micBarFill.style.width = Math.min(100, currentVolume * 400) + "%";
      }

      if (video.readyState >= 2 && video.currentTime !== lastVideoTime) {
        lastVideoTime = video.currentTime;
        const result = faceLandmarker ? faceLandmarker.detectForVideo(video, performance.now()) : null;
        
        // スライダー値取得 & 表示更新
        const h = parseFloat(s_h.value), l = parseFloat(s_l.value), r = parseFloat(s_r.value);
        const bSense = parseFloat(s_blink.value), mSense = parseFloat(s_mic.value);
        const scaleVal = parseFloat(document.getElementById("s_scale").value);
        document.getElementById("v_h").innerText = h.toFixed(2);
        document.getElementById("v_l").innerText = l;
        document.getElementById("v_r").innerText = r;
        document.getElementById("v_blink").innerText = bSense;
        document.getElementById("v_mic").innerText = mSense;
        document.getElementById("v_scale").innerText = scaleVal.toFixed(2);

        const vData = { h, la: l, ra: r, b: bSense, s: {}, r: null,s_scale: scaleVal };

        if (currentVrm) {
          // 姿勢反映
          currentVrm.scene.scale.set(-scaleVal, scaleVal, scaleVal);
          currentVrm.scene.position.y = h;
          const armL = currentVrm.humanoid.getNormalizedBoneNode("leftUpperArm");
          const armR = currentVrm.humanoid.getNormalizedBoneNode("rightUpperArm");
          if(armL) armL.rotation.z = THREE.MathUtils.degToRad(l);
          if(armR) armR.rotation.z = THREE.MathUtils.degToRad(-r);

          const exp = currentVrm.expressionManager;
          if (result && result.faceBlendshapes.length > 0) {
            const shapes = {};
            result.faceBlendshapes[0].categories.forEach(c => { shapes[c.categoryName] = c.score; });

            // まばたき
            exp.setValue("blinkRight", Math.min(1.0, (shapes.eyeBlinkRight || 0) * bSense));
            exp.setValue("blinkLeft", Math.min(1.0, (shapes.eyeBlinkLeft || 0) * bSense));

            // 口パク (VRM 1.0命名 aa に対応)
            const mOpen = Math.min(1.0, currentVolume * mSense);
            exp.setValue("aa", mOpen);
            exp.setValue("ih", 0); exp.setValue("ou", 0); exp.setValue("ee", 0); exp.setValue("oh", 0);

            vData.s = { eyeBlinkRight: shapes.eyeBlinkRight, eyeBlinkLeft: shapes.eyeBlinkLeft, jawOpen: mOpen };
          }

          // 頭の回転
          if (result && result.facialTransformationMatrixes.length > 0) {
            const rawRot = new THREE.Quaternion().setFromRotationMatrix(new THREE.Matrix4().fromArray(result.facialTransformationMatrixes[0].data));
            if (shouldResetPose) { offsetRotation.copy(rawRot).invert(); shouldResetPose = false; }
            let correctedRot = new THREE.Quaternion().multiplyQuaternions(offsetRotation, rawRot);
            vData.r = [correctedRot.x, correctedRot.y, correctedRot.z, correctedRot.w];
            const halfRot = new THREE.Quaternion().set(0,0,0,1).slerp(correctedRot, 0.5);
            const head = currentVrm.humanoid.getNormalizedBoneNode("head"), neck = currentVrm.humanoid.getNormalizedBoneNode("neck");
            if(head && neck) { neck.quaternion.copy(halfRot); head.quaternion.copy(halfRot); }
          }
        }
        connections.forEach(conn => { if (conn.open) conn.send(vData); });
      }
      if (currentVrm) currentVrm.update(1.0/60.0);
      renderer.render(scene, camera);
    }

    // シーン基本設定
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20.0);
    camera.position.set(0, 1.4, 1.5);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    scene.add(new THREE.DirectionalLight(0xffffff, Math.PI), new THREE.AmbientLight(0xffffff, 0.5));

    async function setupTracking() {
      const fileset = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
      faceLandmarker = await FaceLandmarker.createFromOptions(fileset, {
        baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`, delegate: "GPU" },
        outputFaceBlendshapes: true, outputFacialTransformationMatrixes: true, runningMode: "VIDEO"
      });
      // トラッキング準備ができたらループ開始
      animate();
    }
    setupTracking();
  </script>
</body>
</html>
