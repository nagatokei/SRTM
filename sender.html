<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VRM Sender (Final Optimized)</title>
  <style>
    body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
    #ui_panel { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.85); padding: 15px; z-index: 10; border-radius: 8px; border: 1px solid #555; width: 280px; max-height: 90vh; overflow-y: auto; }
    .control-group { margin-bottom: 12px; }
    label { display: block; font-size: 11px; margin-bottom: 3px; color: #ccc; }
    select, input[type="text"], input[type="file"] { width: 100%; padding: 5px; background: #222; color: #fff; border: 1px solid #666; border-radius: 4px; box-sizing: border-box; font-size: 12px; margin-bottom: 5px; }
    input[type="range"] { width: 100%; cursor: pointer; }
    #room_id { cursor: copy; border-color: #0078d4; } 
    button { width: 100%; padding: 8px; cursor: pointer; background: #0078d4; color: white; border: none; border-radius: 4px; font-weight: bold; margin-top: 5px; }
    button:hover { background: #005a9e; }
    .btn-secondary { background: #6c757d; }
    #video_ui { position: absolute; bottom: 10px; right: 10px; width: 160px; opacity: 0.5; }
    video { width: 100%; transform: scaleX(-1); border-radius: 4px; }
    #conn_status { font-size: 12px; color: #ffcc00; margin-top: 10px; font-weight: bold; text-align: center; }
  </style>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

  <div id="ui_panel">
    <b style="font-size: 14px;">VRM Sender (Host)</b>
    
    <div class="control-group" style="margin-top:15px;">
      <label>1. デバイス選択:</label>
      <select id="select_camera"><option>カメラ読み込み中...</option></select>
      <select id="select_mic"><option>マイク読み込み中...</option></select>
    </div>

    <div class="control-group">
      <label>2. 自分のVRMを選択:</label>
      <input type="file" id="vrm_file" accept=".vrm">
    </div>

    <div class="control-group">
      <label>3. ID (クリックコピー):</label>
      <input type="text" id="room_id" readonly>
      <button id="btn_start">送信 & トラッキング開始</button>
      <div id="conn_status">準備完了</div>
    </div>

    <hr style="border: 0; border-top: 1px solid #444; margin: 10px 0;">

    <div class="control-group">
      <label>カメラ・ポーズ調整:</label>
      <button id="btn_reset_pose" class="btn-secondary">正面リセット</button>
      <button id="btn_reset_pos" class="btn-secondary">高さ0リセット</button>
    </div>
    
    <div class="control-group">
      <label>上下角度微調整: <span id="v_pitch">0</span>°</label>
      <input type="range" id="s_pitch" min="-20" max="20" step="1" value="0">
    </div>

    <div class="control-group">
      <label>眉毛の感度: <span id="v_brow">1.5</span></label>
      <input type="range" id="s_brow" min="0.0" max="3.0" step="0.1" value="1.5">
    </div>

    <div class="control-group">
      <label>マイク感度: <span id="v_mouth">1.5</span></label>
      <input type="range" id="s_mouth" min="0.5" max="5.0" step="0.1" value="1.5">
    </div>
    
    <div class="control-group">
      <label>高さ(Y軸): <span id="v_h">0.0</span></label>
      <input type="range" id="s_h" min="-0.5" max="0.5" step="0.01" value="0.0">
    </div>
  </div>

  <div id="video_ui"><video id="input_video" autoplay playsinline></video></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
        "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js",
        "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { VRMLoaderPlugin } from '@pixiv/three-vrm';
    import { FaceLandmarker, FilesetResolver } from '@mediapipe/tasks-vision';

    const video = document.getElementById("input_video");
    const connStatus = document.getElementById("conn_status");
    const camSelect = document.getElementById("select_camera");
    const micSelect = document.getElementById("select_mic");
    const vrmInput = document.getElementById("vrm_file");
    
    const s_h = document.getElementById("s_h");
    const s_pitch = document.getElementById("s_pitch");
    const s_mouth = document.getElementById("s_mouth");
    const s_brow = document.getElementById("s_brow");

    let currentVrm, faceLandmarker, lastVideoTime = -1;
    let peer, connections = [], currentVrmUrl = null;
    let offsetRotation = new THREE.Quaternion();
    let shouldResetPose = false;

    let audioContext, analyser, dataArray;
    let currentVolume = 0;

    async function listDevices() {
      await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
      const devices = await navigator.mediaDevices.enumerateDevices();
      camSelect.innerHTML = ""; micSelect.innerHTML = "";
      devices.forEach(device => {
        const option = document.createElement("option");
        option.value = device.deviceId;
        option.text = device.label || `${device.kind}`;
        if (device.kind === "videoinput") camSelect.appendChild(option);
        else if (device.kind === "audioinput") micSelect.appendChild(option);
      });
    }

    async function initAudio(deviceId) {
      if (audioContext) audioContext.close();
      const stream = await navigator.mediaDevices.getUserMedia({ audio: { deviceId: { exact: deviceId } } });
      audioContext = new AudioContext();
      const source = audioContext.createMediaStreamSource(stream);
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 256;
      source.connect(analyser);
      dataArray = new Uint8Array(analyser.frequencyBinCount);
    }

    async function initCamera(deviceId) {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: deviceId }, width: 640, height: 480 } });
      video.srcObject = stream;
    }

    vrmInput.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      if (currentVrmUrl) URL.revokeObjectURL(currentVrmUrl);
      currentVrmUrl = URL.createObjectURL(file);
      new GLTFLoader().register(p => new VRMLoaderPlugin(p)).load(currentVrmUrl, gltf => {
        if (currentVrm) scene.remove(currentVrm.scene);
        currentVrm = gltf.userData.vrm;
        scene.add(gltf.scene);
        currentVrm.scene.scale.set(-1, 1, 1);
        // 利用可能なモーフ名をコンソールに出力（眉毛のデバッグ用）
        console.log("利用可能なモーフ:", currentVrm.expressionManager.expressions.map(e => e.expressionName));
      });
    };

    function setupHost() {
      const btn = document.getElementById("btn_start");
      const roomIdInput = document.getElementById("room_id");
      let savedId = localStorage.getItem("vrm_host_id") || "vrm-" + Math.random().toString(36).substring(2, 10);
      roomIdInput.value = savedId;
      localStorage.setItem("vrm_host_id", savedId);

      document.getElementById("btn_reset_pose").onclick = () => { shouldResetPose = true; };
      document.getElementById("btn_reset_pos").onclick = () => { s_h.value = 0; };

      btn.onclick = async () => {
        if (!currentVrm) { alert("VRMを選択してください"); return; }
        await initAudio(micSelect.value);
        await initCamera(camSelect.value);
        if (peer) peer.destroy();
        peer = new Peer(roomIdInput.value); 
        peer.on('open', id => { connStatus.innerText = "待機中: " + id; });
        peer.on('connection', conn => {
          conn.on('open', () => { connections.push(conn); });
          conn.on('close', () => { connections = connections.filter(c => c !== conn); });
        });
      };
    }

    function animate() {
      requestAnimationFrame(animate);
      if (analyser) {
        analyser.getByteFrequencyData(dataArray);
        let sum = dataArray.reduce((a, b) => a + b, 0);
        currentVolume = (sum / dataArray.length) / 128.0;
      }

      if (video.readyState >= 2 && video.currentTime !== lastVideoTime) {
        lastVideoTime = video.currentTime;
        const result = faceLandmarker ? faceLandmarker.detectForVideo(video, performance.now()) : null;
        
        const hVal = parseFloat(s_h.value);
        const pVal = parseFloat(s_pitch.value);
        const mVal = parseFloat(s_mouth.value);
        const bSense = parseFloat(s_brow.value);

        const v = { h: hVal, la: 0, ra: 0, b: 1.5, s: {}, r: null };
        
        document.getElementById("v_h").innerText = hVal.toFixed(2);
        document.getElementById("v_pitch").innerText = pVal;
        document.getElementById("v_mouth").innerText = mVal;
        document.getElementById("v_brow").innerText = bSense;

        if (currentVrm) {
          currentVrm.scene.position.y = v.h;
          const exp = currentVrm.expressionManager;

          if (result && result.faceBlendshapes.length > 0) {
            const shapes = {};
            result.faceBlendshapes[0].categories.forEach(c => { shapes[c.categoryName] = c.score; });

            // まばたき (カメラ)
            exp.setValue("blinkRight", Math.min(1.0, (shapes.eyeBlinkRight || 0) * 1.5));
            exp.setValue("blinkLeft", Math.min(1.0, (shapes.eyeBlinkLeft || 0) * 1.5));

            // 💡 眉毛トラ
